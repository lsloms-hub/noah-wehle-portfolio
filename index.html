  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f2f0ec;
      --text: #111111;
      --label: rgba(0,0,0,0.72);
      --subtitle: rgba(0,0,0,0.48);
      --muted: rgba(0,0,0,0.35);
      --border: rgba(0,0,0,0.12);
      --accent: #4a6350;
      --gap-card: 20px;
      --gap-row: 32px;
      --side-pad: 40px;
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: proxima-nova, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      cursor: none;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      z-index: 1000; pointer-events: none;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* ── Crosshair cursor ── */
    .cursor {
      position: fixed; width: 20px; height: 20px;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
    }
    .cursor::before, .cursor::after {
      content: ''; position: absolute; background: var(--accent);
    }
    .cursor::before { width: 1px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
    .cursor::after { width: 100%; height: 1px; top: 50%; left: 0; transform: translateY(-50%); }
    .cursor .cursor-center {
      position: absolute; width: 3px; height: 3px;
      background: var(--accent); border-radius: 50%;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }

    /* ── Nav ── */
    nav {
      display: flex; align-items: flex-end;
      justify-content: space-between;
      padding: 48px var(--side-pad) 36px;
      position: relative; z-index: 10;
    }
    .nav-name {
      font-size: 46px; font-weight: 300;
      letter-spacing: -0.01em; color: var(--text);
      text-decoration: none; text-transform: uppercase;
      cursor: none; line-height: 1;
    }
    .nav-links { display: flex; gap: 28px; list-style: none; padding-bottom: 8px; }
    .nav-links a {
      font-size: 12px; font-weight: 400; letter-spacing: 0.14em;
      color: var(--muted); text-decoration: none; text-transform: uppercase;
      transition: color 0.25s; cursor: none;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: block; }
    #page-contact.active { display: flex; }
    #page-work { padding-bottom: 80px; }

    /* ── 2-1-2 Grid ── */
    .mixed-grid {
      display: flex; flex-direction: column;
      gap: var(--gap-row);
      padding: 0 var(--side-pad) var(--gap-row);
    }
    .row-two { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap-card); }
    .row-one { display: flex; justify-content: center; }
    .row-one .card { width: 62%; }

    /* ── Card ── */
    .card { display: flex; flex-direction: column; cursor: none; }
    .card-thumb {
      position: relative; width: 100%;
      aspect-ratio: 16/9; overflow: hidden; background: #1a1a1a;
    }
    .card-thumb img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: opacity 0.35s ease, transform 0.65s ease;
    }
    .card:hover .card-thumb img { opacity: 0.84; transform: scale(1.02); }

    /* Multi-video indicator */
    .card-thumb .multi-badge {
      position: absolute; bottom: 10px; right: 10px;
      font-size: 9px; letter-spacing: 0.14em;
      color: rgba(255,255,255,0.8); background: rgba(0,0,0,0.45);
      padding: 4px 7px; text-transform: uppercase;
      font-family: proxima-nova, sans-serif;
      backdrop-filter: blur(4px);
    }

    .card-label { padding: 10px 0 0; margin-bottom: var(--gap-row); }
    .card-client {
      font-size: 13px; font-weight: 400; letter-spacing: 0.08em;
      color: var(--label); text-transform: uppercase; line-height: 1;
      transition: color 0.25s; display: block;
    }
    .card-subtitle {
      font-size: 11px; font-weight: 300; letter-spacing: 0.08em;
      color: var(--subtitle); text-transform: uppercase; line-height: 1;
      display: block; margin-top: 5px;
    }
    .card:hover .card-client { color: var(--accent); }

    /* ── Contact ── */
    #page-contact { min-height: 100vh; align-items: center; justify-content: center; }
    .contact-wrap { width: 100%; max-width: 480px; padding: 60px var(--side-pad) 80px; }
    .contact-intro { font-size: 13px; letter-spacing: 0.04em; color: var(--muted); margin-bottom: 48px; line-height: 1.8; }
    .contact-form { display: flex; flex-direction: column; gap: 28px; }
    .form-field { display: flex; flex-direction: column; gap: 8px; }
    .form-field label { font-size: 10px; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; }
    .form-field input, .form-field textarea { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: proxima-nova, 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 13px; letter-spacing: 0.04em; padding: 10px 0; outline: none; transition: border-color 0.2s; width: 100%; resize: none; cursor: none; }
    .form-field input:focus, .form-field textarea:focus { border-bottom-color: var(--accent); }
    .form-field input::placeholder, .form-field textarea::placeholder { color: var(--border); }
    .form-submit { margin-top: 8px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: proxima-nova, 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; padding: 14px 32px; cursor: none; transition: all 0.25s; align-self: flex-start; }
    .form-submit:hover { border-color: var(--accent); color: var(--accent); }
    .form-success { display: none; font-size: 12px; letter-spacing: 0.08em; color: var(--muted); margin-top: 8px; }
    .contact-direct { margin-top: 56px; padding-top: 32px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
    .contact-direct a { font-size: 12px; letter-spacing: 0.08em; color: var(--muted); text-decoration: none; transition: color 0.25s; cursor: none; }
    .contact-direct a:hover { color: var(--accent); }

    /* ── Lightbox ── */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 998;
      background: rgba(0,0,0,0.97);
      align-items: center; justify-content: center; flex-direction: column;
    }
    .lightbox.open { display: flex; animation: fadeIn 0.3s ease; }
    .lightbox-inner { position: relative; width: 86vw; max-width: 1060px; }
    .lightbox-video { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
    .lightbox-video iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

    /* Playlist nav */
    .lightbox-playlist {
      display: none;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      left: 0;
      pointer-events: none;
    }
    .lightbox-playlist.visible { display: flex; justify-content: space-between; }
    .playlist-btn {
      pointer-events: all;
      background: none; border: none; cursor: none;
      padding: 16px;
      opacity: 0.4; transition: opacity 0.2s;
      position: absolute;
    }
    .playlist-btn:hover { opacity: 1; }
    .playlist-btn.prev { left: -56px; }
    .playlist-btn.next { right: -56px; }
    .playlist-btn svg { width: 20px; height: 20px; stroke: #fff; stroke-width: 1px; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    .lightbox-meta {
      margin-top: 0; padding: 12px 0 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; gap: 10px;
    }
    .lightbox-meta::before {
      content: ''; display: block; width: 20px; height: 1px;
      background: var(--accent); flex-shrink: 0;
    }
    .lightbox-title { font-size: 11px; letter-spacing: 0.14em; color: rgba(255,255,255,0.38); text-transform: uppercase; font-weight: 300; flex: 1; }
    .lightbox-counter { font-size: 11px; letter-spacing: 0.1em; color: rgba(255,255,255,0.25); text-transform: uppercase; font-weight: 300; }

    .lightbox-close {
      position: fixed; top: 28px; right: 36px;
      background: none; border: none; cursor: none;
      padding: 0; z-index: 1000;
      opacity: 0.4; transition: opacity 0.2s;
    }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-close svg { width: 18px; height: 18px; stroke: #fff; stroke-width: 1px; stroke-linecap: round; }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      :root { --side-pad: 16px; --gap-card: 12px; --gap-row: 20px; }
      html, body { cursor: auto; }
      .cursor { display: none; }
      nav { padding: 28px var(--side-pad) 20px; flex-direction: column; align-items: flex-start; gap: 16px; }
      .nav-links a, .card, .contact-direct a, .form-submit, .lightbox-close, .playlist-btn, input, textarea { cursor: pointer; }
      .row-two { grid-template-columns: 1fr; }
      .row-one .card { width: 100%; }
      .lightbox-inner { width: 95vw; }
      .lightbox-close { top: 16px; right: 16px; cursor: pointer; }
      .playlist-btn.prev { left: -4px; }
      .playlist-btn.next { right: -4px; }
    }
  </style>
</head>
