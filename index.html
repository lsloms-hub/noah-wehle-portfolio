<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noah Wehle</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='1' y='86' font-family='Helvetica Neue,Helvetica,Arial,sans-serif' font-size='72' font-weight='200' fill='%234a6350'>NW</text></svg>">
  <link rel="stylesheet" href="https://use.typekit.net/ekf4sof.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f2f0ec;
      --text: #111111;
      --label: rgba(0,0,0,0.72);
      --subtitle: rgba(0,0,0,0.48);
      --muted: rgba(0,0,0,0.35);
      --border: rgba(0,0,0,0.12);
      --accent: #4a6350;
      --gap-card: 20px;
      --gap-row: 32px;
      --side-pad: 40px;
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: proxima-nova, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      cursor: none;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      z-index: 1000; pointer-events: none;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* ── Crosshair cursor ── */
    .cursor {
      position: fixed; width: 20px; height: 20px;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
    }
    .cursor::before, .cursor::after {
      content: ''; position: absolute; background: var(--accent);
    }
    .cursor::before { width: 1px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
    .cursor::after { width: 100%; height: 1px; top: 50%; left: 0; transform: translateY(-50%); }
    .cursor .cursor-center {
      position: absolute; width: 3px; height: 3px;
      background: var(--accent); border-radius: 50%;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }

    /* ── Nav ── */
    nav {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 28px var(--side-pad);
      position: relative; z-index: 10;
    }
    .nav-left { display: flex; flex-direction: column; gap: 4px; }
    .nav-name {
      font-size: 20px; font-weight: 400;
      letter-spacing: 0.04em; color: var(--text);
      text-decoration: none; text-transform: uppercase;
      cursor: none; line-height: 1;
    }
    .nav-subtitle {
      font-size: 10px; font-weight: 400; letter-spacing: 0.14em;
      color: var(--muted); text-transform: uppercase; display: block;
    }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a {
      font-size: 12px; font-weight: 400; letter-spacing: 0.14em;
      color: var(--muted); text-decoration: none; text-transform: uppercase;
      transition: color 0.25s; cursor: none;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    /* ── Footer ── */
    footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px var(--side-pad);
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .footer-copy {
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); font-weight: 400;
    }
    .footer-instagram {
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; font-weight: 400;
      transition: color 0.25s; cursor: none;
    }
    .footer-instagram:hover { color: var(--accent); }
    #page-work { padding-bottom: 60px; }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: block; }
    #page-contact.active { display: flex; }
    #page-work { padding-bottom: 80px; }

    /* ── 3-Column Grid ── */
    .mixed-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--gap-card);
      padding: 0 var(--side-pad) var(--gap-row);
    }

    /* ── Card ── */
    .card { display: flex; flex-direction: column; cursor: none; }
    .card-thumb {
      position: relative; width: 100%;
      aspect-ratio: 16/9; overflow: hidden; background: #1a1a1a;
    }
    .card-thumb img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: opacity 0.35s ease, transform 0.65s ease;
    }
    .card:hover .card-thumb img { opacity: 0; transform: scale(1.02); }

    /* Hover video preview */
    .card-thumb .hover-video {
      position: absolute; inset: 0;
      opacity: 0; transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .card-thumb .hover-video iframe {
      width: 100%; height: 100%; border: none;
      position: absolute; inset: 0;
    }
    .card:hover .card-thumb .hover-video { opacity: 1; }

    /* Multi-video indicator */
    .card-thumb .multi-badge {
      position: absolute; bottom: 10px; right: 10px;
      font-size: 9px; letter-spacing: 0.14em;
      color: rgba(255,255,255,0.8); background: rgba(0,0,0,0.45);
      padding: 4px 7px; text-transform: uppercase;
      font-family: proxima-nova, sans-serif;
      backdrop-filter: blur(4px);
    }

    .card-label { padding: 10px 0 0; margin-bottom: var(--gap-row); }
    .card-client {
      font-size: 13px; font-weight: 400; letter-spacing: 0.08em;
      color: var(--label); text-transform: uppercase; line-height: 1;
      transition: color 0.25s; display: block;
    }
    .card-subtitle {
      font-size: 11px; font-weight: 300; letter-spacing: 0.08em;
      color: var(--subtitle); text-transform: uppercase; line-height: 1;
      display: block; margin-top: 5px;
    }
    .card:hover .card-client { color: var(--accent); }

    /* ── Contact ── */
    #page-contact { display: none; }
    #page-contact.active { display: block; }
    .contact-wrap { padding: 0 var(--side-pad) 80px; }
    .contact-page-intro {
      font-size: 13px; letter-spacing: 0.04em; color: var(--label);
      line-height: 1; font-weight: 300; margin-bottom: 32px;
      white-space: nowrap;
    }
    .contact-items { display: flex; flex-direction: column; gap: 24px; }
    .contact-item { display: flex; flex-direction: column; gap: 4px; }
    .contact-item-label {
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); font-weight: 400;
    }
    .contact-item-value {
      font-size: 13px; font-weight: 300; letter-spacing: 0.04em;
      color: var(--text); text-decoration: none;
      transition: color 0.25s; cursor: none; line-height: 1;
    }
    a.contact-item-value:hover { color: var(--accent); }

    /* ── Lightbox ── */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 998;
      background: rgba(0,0,0,0.97);
      align-items: center; justify-content: center; flex-direction: column;
    }
    .lightbox.open { display: flex; animation: fadeIn 0.3s ease; }
    .lightbox-inner { position: relative; width: 86vw; max-width: 1060px; }
    .lightbox-video { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
    .lightbox-video iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

    /* Playlist nav */
    .lightbox-playlist {
      display: none;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      left: 0;
      pointer-events: none;
    }
    .lightbox-playlist.visible { display: flex; justify-content: space-between; }
    .playlist-btn {
      pointer-events: all;
      background: none; border: none; cursor: none;
      padding: 16px;
      opacity: 0.4; transition: opacity 0.2s;
      position: absolute;
    }
    .playlist-btn:hover { opacity: 1; }
    .playlist-btn.prev { left: -56px; }
    .playlist-btn.next { right: -56px; }
    .playlist-btn svg { width: 20px; height: 20px; stroke: #fff; stroke-width: 1px; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    .lightbox-meta {
      margin-top: 0; padding: 12px 0 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; gap: 10px;
    }
    .lightbox-meta::before {
      content: ''; display: block; width: 20px; height: 1px;
      background: var(--accent); flex-shrink: 0;
    }
    .lightbox-title { font-size: 11px; letter-spacing: 0.14em; color: rgba(255,255,255,0.38); text-transform: uppercase; font-weight: 300; flex: 1; }
    .lightbox-counter { font-size: 11px; letter-spacing: 0.1em; color: rgba(255,255,255,0.25); text-transform: uppercase; font-weight: 300; }

    .lightbox-close {
      position: fixed; top: 28px; right: 36px;
      background: none; border: none; cursor: none;
      padding: 0; z-index: 1000;
      opacity: 0.4; transition: opacity 0.2s;
    }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-close svg { width: 18px; height: 18px; stroke: #fff; stroke-width: 1px; stroke-linecap: round; }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      :root { --side-pad: 16px; --gap-card: 12px; --gap-row: 20px; }
      html, body { cursor: auto; }
      .cursor { display: none; }
      nav { padding: 20px var(--side-pad); }
      footer { padding: 12px var(--side-pad); }
      .footer-instagram { cursor: pointer; }
      .nav-links a, .card, .contact-row-value, .form-submit, .lightbox-close, .playlist-btn, input, textarea { cursor: pointer; }
      .mixed-grid { grid-template-columns: 1fr; gap: 6px; }
      .lightbox-inner { width: 95vw; }
      .lightbox-close { top: 16px; right: 16px; cursor: pointer; }
      .playlist-btn.prev { left: -4px; }
      .playlist-btn.next { right: -4px; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"><div class="cursor-center"></div></div>

  <nav>
    <div class="nav-left">
      <a class="nav-name" onclick="showPage('work')">Noah Wehle</a>
      <span class="nav-subtitle">Editor / Producer</span>
    </div>
    <ul class="nav-links">
      <li><a onclick="showPage('work')" class="active" id="nav-work">Work</a></li>
      <li><a onclick="showPage('contact')" id="nav-contact">Contact</a></li>
    </ul>
  </nav>

  <div class="page active" id="page-work">
    <div class="mixed-grid" id="grid"></div>
  </div>

  <div class="page" id="page-contact">
    <div class="contact-wrap">
      <p class="contact-page-intro">Editor & Producer based in New York. Available for commercial, fashion, and documentary work.</p>
      <div class="contact-items">
        <div class="contact-item">
          <span class="contact-item-label">Email</span>
          <a class="contact-item-value" href="/cdn-cgi/l/email-protection#b5dbdad4ddc2d0ddd9d0f5d2d8d4dcd99bd6dad8"><span class="__cf_email__" data-cfemail="620c0d030a15070a0e0722050f030b0e4c010d0f">[email&#160;protected]</span></a>
        </div>
        <div class="contact-item">
          <span class="contact-item-label">Phone</span>
          <a class="contact-item-value" href="tel:+12017230560">201-723-0560</a>
        </div>
        <div class="contact-item">
          <span class="contact-item-label">Instagram</span>
          <a class="contact-item-value" href="https://www.instagram.com/noahwehle/" target="_blank">@noahwehle</a>
        </div>
      </div>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">
      <svg viewBox="0 0 18 18" fill="none"><line x1="1" y1="1" x2="17" y2="17"/><line x1="17" y1="1" x2="1" y2="17"/></svg>
    </button>
    <div class="lightbox-inner">
      <div class="lightbox-video">
        <iframe id="lightbox-iframe" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
        <div class="lightbox-playlist" id="lightbox-playlist">
          <button class="playlist-btn prev" id="playlist-prev">
            <svg viewBox="0 0 20 20"><polyline points="13,4 7,10 13,16"/></svg>
          </button>
          <button class="playlist-btn next" id="playlist-next">
            <svg viewBox="0 0 20 20"><polyline points="7,4 13,10 7,16"/></svg>
          </button>
        </div>
      </div>
      <div class="lightbox-meta">
        <span class="lightbox-title" id="lightbox-title"></span>
        <span class="lightbox-counter" id="lightbox-counter"></span>
      </div>
    </div>
  </div>

  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
    // ── Project Data ──
    // Each project: client, subtitle, thumb, and either vimeoId (single) or videos[] (playlist)
    const projects = [
      { client: "Brandon Maxwell", subtitle: "FW2026", vimeoId: "1168175788", thumb: "BRANDON MAXWELL.jpeg" },
      { client: "Saks Fifth Avenue", subtitle: "Resort Fall 2025", vimeoId: "1154103715", thumb: "SAKS.jpeg" },
      { client: "Nike", subtitle: "N7 Summer 2025", vimeoId: "1157453883", thumb: "NIKE.png" },
      { client: "GH Bass", subtitle: "Collection 2025", vimeoId: "881878472", thumb: "GHBASS.jpeg" },
      { client: "Oura", subtitle: "Give Us The Finger", vimeoId: "1157322073", thumb: "OURA.jpeg" },
      { client: "Chase Sapphire", subtitle: "Travel 2025", vimeoId: "1157321424", thumb: "CHASE.jpeg" },
      { client: "Neiman Marcus", subtitle: "Holiday Campaign 2025", vimeoId: "1157321819", thumb: "NEIMAN MARCUS.jpeg" },
      { client: "Gucci", subtitle: "Campaign", vimeoId: "1157327834", thumb: "GUCCI.jpeg" },
      { client: "Skims", subtitle: "x Swarovski", vimeoId: "1157433160", thumb: "SKIMS 2.jpeg" },
      { client: "Ralph Lauren", subtitle: "NYFW25 BTS", vimeoId: "1157323219", thumb: "RALPH LAUREN.webp" },
      { client: "Lonely Planet", subtitle: "50th Anniversary", vimeoId: "881877855", thumb: "LONELY PLANET.jpeg" },
      { client: "Marriott", subtitle: "Bonvoy / Tribute Portfolio", vimeoId: "500571041", thumb: "MARRIOTT.png" },
      { client: "Refinery 29", subtitle: "The World Your Way", vimeoId: "500667501", thumb: "REFINERY 29.webp" },
      {
        client: "Camp",
        subtitle: "Walmart",
        thumb: "CAMP.jpeg",
        videos: [
          { vimeoId: "555917861", subtitle: "Camp x Walmart" },
          { vimeoId: "788310801", subtitle: "Present Shop" }
        ]
      },
      {
        client: "Baha Mar",
        subtitle: "Mod Op",
        thumb: "BAHAMAR.webp",
        videos: [
          { vimeoId: "289158214", subtitle: "Baha Mar — 1" },
          { vimeoId: "289158222", subtitle: "Baha Mar — 2" },
          { vimeoId: "289159518", subtitle: "Baha Mar — 3" }
        ]
      },
      { client: "Canada Tourism", subtitle: "Destination Indigenous", vimeoId: "555914240", thumb: "ITAC.jpeg" },
      { client: "Love Army", subtitle: "For Somalia", vimeoId: "225362905", thumb: "LOVE ARMY.webp" },
      { client: "GH Bass", subtitle: "Iceland", vimeoId: "881874261", thumb: "GHBASS.jpeg" },
      { client: "A Womans Guide to the World", subtitle: "New Zealand", vimeoId: "216219248", thumb: "A WOMENS GUIDE TO THE WORLD.webp" },
      { client: "Wilder", subtitle: "2019 Showreel", vimeoId: "264144652", thumb: "WILDER.webp" },
      { client: "Yalla", subtitle: "Documentary Trailer", vimeoId: "326901193", thumb: "YALLA.webp" }
    ];

    // ── Build grid ──
    function getVimeoId(p) {
      return p.vimeoId || (p.videos && p.videos[0].vimeoId);
    }

    function makeCard(p) {
      const card = document.createElement('div');
      card.className = 'card';
      const isPlaylist = p.videos && p.videos.length > 1;
      const vimeoId = getVimeoId(p);
      const previewSrc = `https://player.vimeo.com/video/${vimeoId}?autoplay=1&muted=1&loop=1&title=0&byline=0&portrait=0&sidedock=0&controls=0&transparent=0&background=1`;

      card.innerHTML = `
        <div class="card-thumb">
          <img src="${p.thumb}" alt="${p.client}" loading="lazy">
          <div class="hover-video" id="hv-${vimeoId}"></div>
          ${isPlaylist ? `<div class="multi-badge">${p.videos.length} Videos</div>` : ''}
        </div>
        <div class="card-label">
          <span class="card-client">${p.client}</span>
          <span class="card-subtitle">${p.subtitle}</span>
        </div>`;

      const hoverEl = card.querySelector('.hover-video');
      let loaded = false;

      card.addEventListener('mouseenter', () => {
        if (!loaded) {
          const iframe = document.createElement('iframe');
          iframe.src = previewSrc;
          iframe.allow = 'autoplay';
          hoverEl.appendChild(iframe);
          loaded = true;
        }
      });

      card.addEventListener('click', () => openLightbox(p));
      return card;
    }

    const grid = document.getElementById('grid');
    projects.forEach(p => grid.appendChild(makeCard(p)));

    // ── Cursor ──
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });

    // ── Page nav ──
    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      document.getElementById('nav-' + name).classList.add('active');
    }

    // ── Lightbox + Playlist ──
    const lightbox = document.getElementById('lightbox');
    const iframe = document.getElementById('lightbox-iframe');
    const titleEl = document.getElementById('lightbox-title');
    const counterEl = document.getElementById('lightbox-counter');
    const playlistEl = document.getElementById('lightbox-playlist');
    const prevBtn = document.getElementById('playlist-prev');
    const nextBtn = document.getElementById('playlist-next');

    let currentProject = null;
    let currentIndex = 0;

    function loadVideo(index) {
      const isPlaylist = currentProject.videos && currentProject.videos.length > 1;
      const vimeoId = isPlaylist ? currentProject.videos[index].vimeoId : currentProject.vimeoId;
      const subtitle = isPlaylist ? currentProject.videos[index].subtitle : currentProject.subtitle;
      iframe.src = `https://player.vimeo.com/video/${vimeoId}?autoplay=1&title=0&byline=0&portrait=0&sidedock=0&transparent=0&color=4a6350`;
      titleEl.textContent = currentProject.client + ' // ' + subtitle;
      if (isPlaylist) {
        counterEl.textContent = `${index + 1} / ${currentProject.videos.length}`;
        playlistEl.classList.add('visible');
        prevBtn.style.opacity = index === 0 ? '0.15' : '';
        nextBtn.style.opacity = index === currentProject.videos.length - 1 ? '0.15' : '';
      } else {
        counterEl.textContent = '';
        playlistEl.classList.remove('visible');
      }
    }

    function openLightbox(p) {
      currentProject = p;
      currentIndex = 0;
      loadVideo(0);
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      iframe.src = '';
      document.body.style.overflow = '';
      currentProject = null;
    }

    prevBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (currentProject.videos && currentIndex > 0) {
        currentIndex--;
        loadVideo(currentIndex);
      }
    });

    nextBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (currentProject.videos && currentIndex < currentProject.videos.length - 1) {
        currentIndex++;
        loadVideo(currentIndex);
      }
    });

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight' && currentProject?.videos) { if (currentIndex < currentProject.videos.length - 1) { currentIndex++; loadVideo(currentIndex); } }
      if (e.key === 'ArrowLeft' && currentProject?.videos) { if (currentIndex > 0) { currentIndex--; loadVideo(currentIndex); } }
    });
  </script>
</body>
</html>
